content: |
  Surfing and beach holidays in Fuerteventura. Cristiano and his tiger striped dog. Surf wax and stale wetsuit smell. Intrepid explorations of the lava flow around the lagoon. With Mum, trying in vain to catch the sunset every night.

  Reading Ringworld, Dune. Playing a bit of Prison Architect, eating monstrous amounts of gambas al ajillo. Secreto Iberico at Bagus, S. devouring croquetas. Surf highlights on the TV behind the bar. Playing the zombie driving game on my iPad on the balcony.

  Walking to the Lighthouse with A. Hearing some canarian whistling.

