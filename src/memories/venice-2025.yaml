content: |-
    *Don't Smile* - A singing this constantly while trying to come to terms with the future nostalgia.
    
    *back to friends* - Airport and travel song for this trip.

    Reading Piranesi. The AirBnB and all meals we cooked being extremely truffly because of the oil that was left there. Query response. Theatre supermarket. Far too ~~much~~ little pistachio ice cream. The most carby carbonara, the angry shop owner. So much more.
