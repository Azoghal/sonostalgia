content: Fantastically hot summer, eating lunch watching cricket on the common. Witnessing the grass  parch over the course of the heatwave. Fantastic petrichor when running around the cathedral and Verulamium park. Flat brained drives back to St Albans. Safety third and the weekly commute back home to play cricket. A little bit of EVE when possible. Interesting spare room.
