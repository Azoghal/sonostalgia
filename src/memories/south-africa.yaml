content: |
  Listening to *Tongue of Bombie* while driving around the north part of the Kruger Park. Reading Dune for the first (or third??) time.

  *Lost* - the drive across from PE to Wilderness. Not having any firewood ready for the cabin. Sleeping in a beanie and thick socks. Sol introducing me to Sum 41.

