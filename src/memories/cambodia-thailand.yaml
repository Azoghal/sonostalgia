content: |
  Travelling around Cambodia with Mum & Dad. Crazy tuk tuk journeys. Raffles and the chinese super villain smoking a cigar at all times of day. The super fiery but refreshing Ginger drink when we first arrived. Having to buy underwear from the market as Dad forgot to pack any.
  
  Eating lots of deep fried morning glory. Red ant curry and Mum eating it without realising! Reading 1984 by the pool with the elephant statues in Siem Reap. Crazy tuk tuk driving out to the far away temple, on the logging road. Being able to echo-locate individual trees as logging lorries went by.

  Angkor Wat, Angkor Thom and Ta Prohm. Halo rainbow around the midday sun. 

  Koh Samui, Pad Thai every day, and *I'd Love You to Want Me* playing every breakfast, lunch and dinner. Excellent green curry just down the road with the German waiter.

