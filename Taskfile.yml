# https://taskfile.dev

version: '3'

#vars 

tasks:
  build:
    desc: "build all go binaries"
    tasks:
      - build-templater
      - build-songfetcher
      - build-creator
    
  build-templater:
    desc: "build the webpage builder go binary"
    dir: cmd
    cmds: 
      - mkdir -p ../build
      - go build -o ../build/templater 
    
  build-songfetcher:
    desc: "build the song fetcher go binary"
    dir: songfetcher/cmd
    cmds: 
      - mkdir -p ../../build
      - go build -o ../../build/songfetcher

  build-creator:
    desc: "build the memory creator web server"
    dir: creator/cmd
    cmds:
      - mkdir -p ../../build
      - go build -o ../../build/creator

  start-creator:
    desc: "build and start the memory creator at http://localhost:8765"
    deps:
      - build-creator
    cmds:
      - ./build/creator

  build-webpage:
    desc: "do the templating and produce website artefacts"
    deps:
      - build-templater
    cmds: 
      - ./build/templater
      - mkdir -p ./output/assets
      - cp -r ./src/assets ./output/

  template-wip-memory:
    desc: |
      Use the song fetcher to fetch songs from the spotify API and populate a new memory.
      Call with one argument, the filename within the src/wip-memories directory.
    deps:
      - build-songfetcher
    cmds: 
      - build/songfetcher $(xargs -a src/wip-memories/{{.CLI_ARGS}})

  clean:
    desc: "clean up"
    cmds:
      - rm -r build
      - rm -r output